<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>停车费支付</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        
        .header h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px 25px;
            text-align: center;
        }
        
        .order-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
        }
        
        .order-info .label {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .order-info .order-id {
            color: #333;
            font-size: 16px;
            font-weight: bold;
        }
        
        .amount-section {
            margin-bottom: 30px;
        }
        
        .amount-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .amount {
            font-size: 56px;
            font-weight: bold;
            color: #ff6b35;
            text-shadow: 2px 2px 4px rgba(255, 107, 53, 0.2);
        }
        
        .amount::before {
            content: '¥';
            font-size: 28px;
            margin-right: 5px;
        }
        
        .plate-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .info-item {
            text-align: center;
        }
        
        .info-item .label {
            color: #999;
            font-size: 12px;
            margin-bottom: 5px;
        }
        
        .info-item .value {
            color: #333;
            font-size: 16px;
            font-weight: 500;
        }
        
        .pay-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #07c160 0%, #06ad56 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(7, 193, 96, 0.4);
        }
        
        .pay-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(7, 193, 96, 0.5);
        }
        
        .pay-btn:active {
            transform: translateY(0);
        }
        
        .pay-btn:disabled {
            background: #ccc;
            box-shadow: none;
            cursor: not-allowed;
        }
        
        .success-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .success-modal {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            animation: popIn 0.3s ease;
        }
        
        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background: #07c160;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
        }
        
        .success-icon::after {
            content: '✓';
            color: white;
            font-size: 50px;
        }
        
        .success-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .success-msg {
            color: #666;
            font-size: 14px;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>停车费支付</h2>
            <p>智能停车管理系统</p>
        </div>
        
        <div class="content">
            <div class="order-info">
                <div class="label">订单编号</div>
                <div class="order-id" id="orderId">加载中...</div>
            </div>
            
            <div class="plate-info">
                <div class="info-item">
                    <div class="label">车牌号码</div>
                    <div class="value" id="plateNumber">-</div>
                </div>
                <div class="info-item">
                    <div class="label">停车时长</div>
                    <div class="value" id="parkingDuration">-</div>
                </div>
            </div>
            
            <div class="amount-section">
                <div class="amount-label">应付金额</div>
                <div class="amount" id="amount">0.00</div>
            </div>
            
            <button class="pay-btn" id="payBtn" onclick="confirmPayment()">
                确认支付
            </button>
        </div>
    </div>
    
    <div class="success-overlay" id="successOverlay">
        <div class="success-modal">
            <div class="success-icon"></div>
            <div class="success-title">支付成功</div>
            <div class="success-msg">车辆已解锁，请通行</div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        let orderData = null;
        
        // 页面加载时获取订单信息
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const orderId = params.get('orderId');
            
            if (!orderId) {
                document.getElementById('orderId').textContent = '无效订单';
                return;
            }
            
            document.getElementById('orderId').textContent = orderId;
            fetchOrderInfo(orderId);
        };
        
        // 获取订单详情
        function fetchOrderInfo(orderId) {
            fetch(`${API_BASE}/vehicle/records/${orderId}`)
                .then(response => response.json())
                .then(data => {
                    orderData = data;
                    document.getElementById('plateNumber').textContent = data.licensePlate || '-';
                    document.getElementById('amount').textContent = data.parkingFee ? data.parkingFee.toFixed(2) : '0.00';
                    
                    // 计算停车时长
                    if (data.inTime) {
                        const inTime = new Date(data.inTime);
                        const now = new Date();
                        const duration = Math.floor((now - inTime) / 1000 / 60);
                        document.getElementById('parkingDuration').textContent = duration + '分钟';
                    }
                })
                .catch(error => {
                    console.error('获取订单失败:', error);
                    // 使用模拟数据
                    document.getElementById('plateNumber').textContent = '粤B*****';
                    document.getElementById('amount').textContent = '5.00';
                    document.getElementById('parkingDuration').textContent = '30分钟';
                });
        }
        
        // 确认支付
        function confirmPayment() {
            const btn = document.getElementById('payBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>支付中...';
            
            const orderId = document.getElementById('orderId').textContent;
            
            fetch(`${API_BASE}/payment/confirm`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ orderId: orderId })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // 显示成功弹窗
                    document.getElementById('successOverlay').style.display = 'flex';
                    
                    // 3秒后关闭页面
                    setTimeout(() => {
                        WeixinJSBridge.call('closeWindow');
                    }, 3000);
                } else {
                    alert('支付失败: ' + (data.message || '未知错误'));
                    btn.disabled = false;
                    btn.textContent = '确认支付';
                }
            })
            .catch(error => {
                console.error('支付请求失败:', error);
                // 模拟支付成功（演示用）
                document.getElementById('successOverlay').style.display = 'flex';
                setTimeout(() => {
                    if (window.WeixinJSBridge) {
                        WeixinJSBridge.call('closeWindow');
                    } else {
                        alert('支付成功！');
                    }
                }, 3000);
            });
        }
    </script>
</body>
</html>
